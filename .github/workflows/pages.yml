name: Deploy static dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          path: site-src
      - uses: actions/checkout@v4
        with:
          ref: data
          path: data-src
      - name: Prepare static artifact
        run: |
          mkdir -p _site/data _site/learn _site/tokens _site/tokens/widget
          cp site-src/index.html _site/
          cp site-src/learn/index.html site-src/learn/app.js site-src/learn/style.css _site/learn/
          cp site-src/tokens/index.html site-src/tokens/app.js site-src/tokens/style.css _site/tokens/
          cp site-src/tokens/widget/index.html site-src/tokens/widget/app.js site-src/tokens/widget/style.css _site/tokens/widget/
          cp data-src/data/macmini.json data-src/data/tokens.json _site/data/
          cp data-src/data/tokens_history.json _site/data/ 2>/dev/null || true
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4

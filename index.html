<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Jehyun Lee Dashboards</title>
  <style>
    :root{color-scheme:light;--bg:#f7f7f5;--panel:#fff;--ink:#111827;--muted:#667085;--line:#e5e7eb;--ok:#16a34a;--shadow:0 8px 24px rgba(15,23,42,.06)}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Noto Sans KR",Segoe UI,sans-serif;color:var(--ink)}
    main{max-width:920px;margin:0 auto;padding:clamp(1.2rem,4vw,3rem)}
    header{padding:2rem 0 1.2rem;border-bottom:1px solid var(--line)}
    .eyebrow{margin:0 0 .4rem;color:var(--muted);font-size:.75rem;font-weight:850;letter-spacing:.14em;text-transform:uppercase}
    h1{margin:0;font-size:clamp(2rem,5vw,3.4rem);letter-spacing:-.06em}p{color:var(--muted);line-height:1.65}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1rem;margin-top:1.4rem}
    a.card{display:block;text-decoration:none;color:inherit;background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:1.1rem;box-shadow:var(--shadow)}
    a.card:hover{border-color:#cbd5e1;transform:translateY(-1px)}
    h2{margin:.2rem 0 .45rem;font-size:1.1rem;letter-spacing:-.03em}.status{display:inline-flex;align-items:center;gap:.4rem;color:#166534;background:#dcfce7;border-radius:999px;padding:.25rem .6rem;font-size:.72rem;font-weight:900;text-transform:uppercase}.dot{width:.55rem;height:.55rem;border-radius:999px;background:var(--ok)}
    footer{margin-top:2rem;color:#94a3b8;font-size:.82rem}
  </style>
</head>
<body>
  <main>
    <header>
      <p class="eyebrow">JEHYUNLEE DASHBOARDS</p>
      <h1>Dashboards</h1>
      <p>운영 상태를 한 곳에서 확인하는 가벼운 대시보드 허브.</p>
    </header>
    <section class="grid" aria-label="dashboard list">
      <a class="card" href="./learn/">
        <span class="status"><span class="dot"></span>active</span>
        <h2>Learn Workflow</h2>
        <p>Dashun Wang 교재 제작·오디오 변환·메일 발송 workflow 상태.</p>
      </a>
      <a class="card" href="./tokens/">
        <span class="status"><span class="dot"></span>active</span>
        <h2>Token Limits</h2>
        <p>OpenAI, Anthropic, Gemini API 연결 상태와 토큰 한도/리셋 정보.</p>
      </a>
    </section>
    <footer>tech.jehyunlee.dev/dashboards</footer>
  </main>
</body>
</html>
